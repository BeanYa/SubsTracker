<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html {
    color-scheme: light dark;
    scroll-behavior: smooth;
    background: #ffffff;
  }

  :root {
    --font-display: sohne-var, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --font-body: sohne-var, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --font-mono: "Source Code Pro", "SFMono-Regular", Consolas, monospace;

    --color-primary: #533afd;
    --color-primary-hover: #4434d4;
    --color-primary-deep: #2e2b8c;
    --color-primary-light: #b9b9f9;
    --color-primary-soft: #d6d9fc;
    --color-accent: #665efd;
    --color-accent-hover: #4434d4;

    --color-bg: #ffffff;
    --color-surface: #ffffff;
    --color-surface-alt: #f6f9fc;
    --color-card: rgba(255, 255, 255, 0.96);
    --color-card-strong: #ffffff;

    --color-heading: #061b31;
    --color-label: #273951;
    --color-text: #061b31;
    --color-text-muted: #64748d;
    --color-text-subtle: #7f8ea5;

    --color-success: #15be53;
    --color-success-text: #108c3d;
    --color-warning: #9b6829;
    --color-danger: #ea2261;
    --color-danger-text: #cb1f59;
    --color-info: #2874ad;

    --color-border: #e5edf5;
    --color-border-strong: #d6d9fc;
    --color-border-subtle: rgba(229, 237, 245, 0.9);

    --color-shadow: rgba(50, 50, 93, 0.25) 0px 30px 45px -30px, rgba(0, 0, 0, 0.1) 0px 18px 36px -18px;
    --color-shadow-ambient: rgba(23, 23, 23, 0.08) 0px 15px 35px 0px;
    --color-shadow-deep: rgba(3, 3, 39, 0.25) 0px 14px 21px -14px, rgba(0, 0, 0, 0.1) 0px 8px 17px -8px;

    --dark-bg-primary: #0d253d;
    --dark-bg-secondary: rgba(13, 37, 61, 0.9);
    --dark-bg-tertiary: #102846;
    --dark-bg-quaternary: #1c1e54;
    --dark-border: rgba(185, 185, 249, 0.18);
    --dark-border-subtle: rgba(185, 185, 249, 0.12);
    --dark-text-main: #ffffff;
    --dark-text-muted: rgba(255, 255, 255, 0.72);
    --dark-text-subtle: rgba(255, 255, 255, 0.52);
    --dark-shadow: rgba(3, 3, 39, 0.25) 0px 30px 45px -30px, rgba(0, 0, 0, 0.18) 0px 18px 36px -18px;
  }

  * {
    box-sizing: border-box;
  }

  html.dark {
    background: #0d253d;
    --color-bg: #0d253d;
  }

  body {
    margin: 0;
    min-height: 100vh;
    position: relative;
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 300;
    line-height: 1.4;
    color: var(--color-text-muted);
    background:
      radial-gradient(circle at 12% 0%, rgba(249, 107, 238, 0.09), transparent 26%),
      radial-gradient(circle at 88% 12%, rgba(83, 58, 253, 0.12), transparent 26%),
      linear-gradient(180deg, #ffffff 0%, #f6f9fc 100%);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01" 1;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 100% 0%, rgba(234, 34, 97, 0.06), transparent 28%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0) 32%);
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.22;
    background-image:
      linear-gradient(rgba(6, 27, 49, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6, 27, 49, 0.03) 1px, transparent 1px);
    background-size: 96px 96px;
  }

  html.dark body {
    color: var(--dark-text-muted);
    background:
      radial-gradient(circle at 12% 0%, rgba(249, 107, 238, 0.12), transparent 28%),
      radial-gradient(circle at 88% 14%, rgba(83, 58, 253, 0.2), transparent 28%),
      linear-gradient(180deg, #0d253d 0%, #102846 52%, #1c1e54 100%);
  }

  html.dark body::before {
    background:
      radial-gradient(circle at 100% 0%, rgba(234, 34, 97, 0.12), transparent 30%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0) 36%);
  }

  html.dark body::after {
    opacity: 0.18;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
  }

  ::selection {
    background: rgba(83, 58, 253, 0.16);
    color: inherit;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 300;
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: var(--color-heading);
    text-wrap: balance;
    font-feature-settings: "ss01" 1;
  }

  p,
  label,
  span,
  a,
  button,
  input,
  select,
  textarea {
    font-feature-settings: "ss01" 1;
  }

  code,
  pre,
  #systemTimeDisplay,
  #mobileTimeDisplay,
  .shell-time,
  .hero-eyebrow,
  .hero-stat span,
  .stat-card-header,
  .badge,
  .status-pill,
  .table-kicker,
  thead th {
    font-family: var(--font-mono);
    font-feature-settings: normal;
    font-variant-numeric: tabular-nums;
  }

  .stat-card-value,
  .list-item-amount,
  .ranking-item-amount,
  .ranking-item-percentage,
  .period-amount,
  .legend-amount,
  .legend-pct,
  .scheduler-value,
  .scheduler-label,
  .shell-time {
    font-variant-numeric: tabular-nums;
  }

  a {
    text-decoration: none;
    transition: color 0.18s ease, border-color 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
  }

  a:not(.btn-primary):not(.btn-secondary):not(.btn-success):not(.btn-warning):not(.btn-danger):not(.btn-info) {
    color: inherit;
  }

  a:not(.btn-primary):not(.btn-secondary):not(.btn-success):not(.btn-warning):not(.btn-danger):not(.btn-info):hover {
    color: var(--color-primary);
  }

  html.dark a:not(.btn-primary):not(.btn-secondary):not(.btn-success):not(.btn-warning):not(.btn-danger):not(.btn-info):hover {
    color: #ffffff;
  }

  button:disabled,
  input:disabled,
  select:disabled,
  textarea:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 40;
    background: rgba(255, 255, 255, 0.86) !important;
    border-bottom: 1px solid rgba(229, 237, 245, 0.92) !important;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 1px 0 rgba(0, 55, 112, 0.08), 0 16px 30px -28px rgba(50, 50, 93, 0.35);
  }

  html.dark nav {
    background: rgba(13, 37, 61, 0.78) !important;
    border-bottom-color: rgba(185, 185, 249, 0.14) !important;
    box-shadow: 0 1px 0 rgba(0, 55, 112, 0.18), var(--color-shadow-deep);
  }

  .shell-nav-inner {
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 4.75rem;
  }

  .shell-brand {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    min-width: 0;
  }

  .shell-brand-link {
    padding: 0.38rem 0.5rem;
    margin-left: -0.5rem;
    border-radius: 10px;
    border: 1px solid transparent;
    color: inherit;
  }

  .shell-brand-link:hover {
    color: inherit;
    border-color: var(--color-border);
    background: rgba(83, 58, 253, 0.04);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
  }

  .shell-brand-link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(83, 58, 253, 0.12);
  }

  .shell-brand-mark {
    position: relative;
    width: 2.75rem;
    height: 2.75rem;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: linear-gradient(180deg, #665efd 0%, #533afd 100%);
    color: #ffffff;
    box-shadow: rgba(50, 50, 93, 0.25) 0px 16px 28px -20px, rgba(0, 0, 0, 0.12) 0px 10px 18px -14px;
  }

  .shell-brand-mark::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    border: 1px solid rgba(255, 255, 255, 0.18);
  }

  .shell-brand-copy {
    display: flex;
    flex-direction: column;
    min-width: 0;
    line-height: 1.05;
  }

  .shell-brand-copy span {
    color: var(--color-heading);
    font-family: var(--font-display);
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: -0.02em;
  }

  .shell-brand-copy small {
    margin-top: 0.2rem;
    color: var(--color-text-subtle);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  html.dark .shell-brand-copy span {
    color: var(--dark-text-main);
  }

  html.dark .shell-brand-copy small {
    color: var(--dark-text-subtle);
  }

  html.dark .shell-brand-link:hover {
    border-color: var(--dark-border);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: none;
  }

  html.dark .shell-brand-link:focus-visible {
    box-shadow: 0 0 0 3px rgba(185, 185, 249, 0.16);
  }

  .shell-time {
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--color-border);
    background: rgba(246, 249, 252, 0.94);
    color: var(--color-label);
    font-size: 0.72rem;
    line-height: 1.2;
    letter-spacing: 0.03em;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    white-space: nowrap;
  }

  html.dark .shell-time {
    border-color: var(--dark-border);
    background: rgba(255, 255, 255, 0.04);
    color: var(--dark-text-muted);
    box-shadow: none;
  }

  .shell-menu-btn {
    width: 2.5rem;
    height: 2.5rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--color-label);
  }

  .shell-menu-btn:hover {
    color: var(--color-heading);
    border-color: var(--color-border);
    background: rgba(83, 58, 253, 0.04);
  }

  html.dark .shell-menu-btn {
    color: var(--dark-text-main);
  }

  html.dark .shell-menu-btn:hover {
    border-color: var(--dark-border);
    background: rgba(255, 255, 255, 0.05);
  }

  .shell-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.62rem 0.85rem;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--color-label);
    font-size: 0.88rem;
    font-weight: 400;
    line-height: 1;
  }

  .shell-link:hover {
    color: var(--color-heading);
    border-color: var(--color-border);
    background: rgba(83, 58, 253, 0.04);
  }

  .shell-link-active {
    color: var(--color-primary);
    border-color: var(--color-primary-light);
    background: rgba(83, 58, 253, 0.06);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
  }

  html.dark .shell-link {
    color: var(--dark-text-muted);
  }

  html.dark .shell-link:hover {
    color: var(--dark-text-main);
    border-color: var(--dark-border);
    background: rgba(255, 255, 255, 0.05);
  }

  html.dark .shell-link-active {
    color: #ffffff;
    border-color: rgba(185, 185, 249, 0.28);
    background: rgba(185, 185, 249, 0.1);
    box-shadow: none;
  }

  .shell-mobile-panel {
    background: rgba(255, 255, 255, 0.96);
    border-top: 1px solid var(--color-border);
    border-bottom: 1px solid var(--color-border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  html.dark .shell-mobile-panel {
    background: rgba(13, 37, 61, 0.96);
    border-color: var(--dark-border);
  }

  .shell-mobile-link {
    display: block;
    padding: 0.9rem 1rem;
    border-radius: 6px;
    border: 1px solid transparent;
    color: var(--color-label);
    font-weight: 400;
  }

  .shell-mobile-link:hover {
    color: var(--color-heading);
    border-color: var(--color-border);
    background: rgba(83, 58, 253, 0.04);
  }

  .shell-mobile-link-active {
    color: var(--color-primary);
    border-color: var(--color-primary-light);
    background: rgba(83, 58, 253, 0.06);
  }

  html.dark .shell-mobile-link {
    color: var(--dark-text-muted);
  }

  html.dark .shell-mobile-link:hover {
    color: var(--dark-text-main);
    background: rgba(255, 255, 255, 0.05);
  }

  html.dark .shell-mobile-link-active {
    color: #ffffff;
    border-color: rgba(185, 185, 249, 0.28);
    background: rgba(185, 185, 249, 0.1);
  }

  .hero-banner {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    padding: 2rem;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(246, 249, 252, 0.98) 100%);
    box-shadow: var(--color-shadow);
  }

  .hero-banner::before {
    content: '';
    position: absolute;
    top: -18%;
    right: -8%;
    width: 20rem;
    height: 20rem;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249, 107, 238, 0.18) 0%, rgba(83, 58, 253, 0.1) 42%, transparent 72%);
    pointer-events: none;
  }

  .hero-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(255, 255, 255, 0.62) 0%, rgba(255, 255, 255, 0) 32%, rgba(83, 58, 253, 0.04) 72%, rgba(234, 34, 97, 0.06) 100%);
    pointer-events: none;
  }

  html.dark .hero-banner {
    border-color: rgba(185, 185, 249, 0.18);
    background: linear-gradient(180deg, rgba(28, 30, 84, 0.94) 0%, rgba(13, 37, 61, 0.96) 100%);
    box-shadow: var(--color-shadow-deep);
  }

  html.dark .hero-banner::before {
    background: radial-gradient(circle, rgba(249, 107, 238, 0.22) 0%, rgba(83, 58, 253, 0.18) 42%, transparent 74%);
  }

  .hero-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(16rem, 0.95fr);
    gap: 1.5rem;
    align-items: start;
  }

  .hero-eyebrow {
    margin-bottom: 0.85rem;
    color: var(--color-primary);
    font-size: 0.75rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .hero-title {
    max-width: 11ch;
    font-size: clamp(2rem, 4.6vw, 3.5rem);
    font-weight: 300;
    line-height: 1.03;
    letter-spacing: -0.04em;
    color: var(--color-heading);
  }

  .hero-copy {
    margin: 1rem 0 0;
    max-width: 60ch;
    color: var(--color-text-muted);
    font-size: clamp(1rem, 1.4vw, 1.125rem);
    line-height: 1.4;
  }

  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-top: 1.25rem;
  }

  .hero-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.55rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--color-primary-soft);
    background: rgba(255, 255, 255, 0.94);
    color: var(--color-label);
    font-size: 0.82rem;
    font-weight: 400;
  }

  .hero-pill i {
    color: var(--color-primary);
  }

  .hero-aside {
    display: grid;
    gap: 0.9rem;
  }

  .hero-stat {
    position: relative;
    min-height: 9rem;
    padding: 1rem 1rem 1.1rem;
    border-radius: 8px;
    border: 1px solid var(--color-border);
    background: rgba(255, 255, 255, 0.94);
    box-shadow: rgba(23, 23, 23, 0.06) 0px 3px 6px;
    overflow: hidden;
  }

  .hero-stat::after {
    content: '';
    position: absolute;
    right: -10%;
    bottom: -24%;
    width: 8rem;
    height: 8rem;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(83, 58, 253, 0.08), transparent 70%);
  }

  .hero-stat-accent {
    border-color: transparent;
    background: linear-gradient(180deg, rgba(28, 30, 84, 0.98) 0%, rgba(13, 37, 61, 0.98) 100%);
    box-shadow: var(--color-shadow-deep);
  }

  .hero-stat-accent::after {
    background: radial-gradient(circle, rgba(249, 107, 238, 0.18), transparent 72%);
  }

  .hero-stat span {
    position: relative;
    z-index: 1;
    display: block;
    margin-bottom: 1rem;
    color: var(--color-text-subtle);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .hero-stat strong {
    position: relative;
    z-index: 1;
    display: block;
    color: var(--color-heading);
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 300;
    line-height: 1.08;
    letter-spacing: -0.02em;
  }

  .hero-stat small {
    position: relative;
    z-index: 1;
    display: block;
    margin-top: 0.72rem;
    color: var(--color-text-muted);
    font-size: 0.86rem;
    line-height: 1.5;
  }

  .hero-stat-accent span {
    color: rgba(255, 255, 255, 0.72);
  }

  .hero-stat-accent strong {
    color: #ffffff;
  }

  .hero-stat-accent small {
    color: rgba(255, 255, 255, 0.76);
  }

  html.dark .hero-eyebrow {
    color: #ffffff;
  }

  html.dark .hero-title,
  html.dark .hero-stat:not(.hero-stat-accent) strong {
    color: var(--dark-text-main);
  }

  html.dark .hero-copy,
  html.dark .hero-pill,
  html.dark .hero-stat:not(.hero-stat-accent) small {
    color: var(--dark-text-muted);
  }

  html.dark .hero-pill,
  html.dark .hero-stat:not(.hero-stat-accent) {
    border-color: var(--dark-border);
    background: rgba(255, 255, 255, 0.05);
  }

  html.dark .hero-stat:not(.hero-stat-accent) span {
    color: var(--dark-text-subtle);
  }

  html.dark .hero-pill i {
    color: #ffffff;
  }

  .glass-card,
  .surface-card {
    border-radius: 8px;
    background: var(--color-card);
    border: 1px solid var(--color-border);
    box-shadow: var(--color-shadow);
  }

  html.dark .glass-card,
  html.dark .surface-card {
    background: var(--dark-bg-secondary);
    border-color: var(--dark-border);
    box-shadow: var(--color-shadow-deep);
  }

  .card-hover {
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.18s ease, background-color 0.18s ease;
  }

  .card-hover:hover {
    transform: translateY(-2px);
    box-shadow: rgba(50, 50, 93, 0.3) 0px 34px 54px -32px, rgba(0, 0, 0, 0.12) 0px 22px 40px -22px;
  }

  html.dark .card-hover:hover {
    box-shadow: rgba(3, 3, 39, 0.3) 0px 26px 42px -26px, rgba(0, 0, 0, 0.16) 0px 20px 34px -20px;
  }

  .table-container {
    border: 1px solid var(--color-border);
    border-radius: 8px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: var(--color-shadow);
  }

  html.dark .table-container {
    background: var(--dark-bg-secondary);
    border-color: var(--dark-border);
    box-shadow: var(--color-shadow-deep);
  }

  thead {
    background: #f6f9fc !important;
  }

  thead th {
    color: var(--color-label) !important;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--color-border) !important;
  }

  tbody tr {
    transition: background-color 0.18s ease, border-color 0.18s ease;
  }

  tbody tr:hover {
    background: rgba(83, 58, 253, 0.03) !important;
  }

  html.dark thead {
    background: rgba(255, 255, 255, 0.04) !important;
  }

  html.dark thead th {
    color: var(--dark-text-muted) !important;
    border-bottom-color: var(--dark-border) !important;
  }

  html.dark tbody tr:hover {
    background: rgba(255, 255, 255, 0.05) !important;
  }

  input,
  select,
  textarea {
    border-radius: 4px !important;
    border: 1px solid var(--color-border) !important;
    background: #ffffff !important;
    color: var(--color-heading) !important;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
  }

  input:hover,
  select:hover,
  textarea:hover {
    border-color: var(--color-border-strong) !important;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--color-primary) !important;
    background: #ffffff !important;
    box-shadow: 0 0 0 3px rgba(83, 58, 253, 0.12) !important;
  }

  html.dark input,
  html.dark select,

<script>
  (function() {
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

    function applyTheme(mode) {
      const html = document.documentElement;
      const isSystemDark = mediaQuery.matches;
      const useDark = mode === 'dark' || (mode === 'system' && isSystemDark);

      html.classList.toggle('dark', useDark);
      html.dispatchEvent(new CustomEvent('themechange', {
        detail: {
          mode,
          isDark: useDark
        }
      }));
    }

    const savedTheme = localStorage.getItem('themeMode') || 'system';
    applyTheme(savedTheme);

    const handleSystemThemeChange = function() {
      const currentMode = localStorage.getItem('themeMode') || 'system';
      if (currentMode === 'system') {
        applyTheme('system');
      }
    };

    if (typeof mediaQuery.addEventListener === 'function') {
      mediaQuery.addEventListener('change', handleSystemThemeChange);
    } else if (typeof mediaQuery.addListener === 'function') {
      mediaQuery.addListener(handleSystemThemeChange);
    }

    window.addEventListener('load', async () => {
      if (window.location.pathname.startsWith('/admin')) {
        try {
          const res = await fetch('/api/config');
          const config = await res.json();
          if (config.THEME_MODE && config.THEME_MODE !== localStorage.getItem('themeMode')) {
            localStorage.setItem('themeMode', config.THEME_MODE);
            applyTheme(config.THEME_MODE);
            const select = document.getElementById('themeModeSelect');
            if (select) {
              select.value = config.THEME_MODE;
            }
          }
        } catch (e) {}
      }
    });

    window.updateAppTheme = function(mode) {
      localStorage.setItem('themeMode', mode);
      applyTheme(mode);
    };
  })();
</script>
