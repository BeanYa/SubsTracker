
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Serif+SC:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
  html {
    color-scheme: light dark;
    scroll-behavior: smooth;
    background: #f2ecdf;
  }

  :root {
    --font-display: 'Noto Serif SC', 'Songti SC', serif;
    --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --font-mono: 'IBM Plex Mono', 'JetBrains Mono', monospace;

    --color-primary: #9c7340;
    --color-primary-hover: #7b5a31;
    --color-primary-light: #d7b07a;
    --color-accent: #667f95;
    --color-accent-hover: #4d657b;

    --color-surface: #f2ecdf;
    --color-surface-alt: #e8dfd1;
    --color-card: rgba(255, 249, 241, 0.78);
    --color-card-strong: #fbf6ee;
    --color-border: rgba(109, 82, 47, 0.18);
    --color-border-strong: rgba(109, 82, 47, 0.28);
    --color-border-subtle: rgba(109, 82, 47, 0.08);
    --color-text: #241a13;
    --color-text-muted: #665847;
    --color-text-subtle: #988570;
    --color-shadow: 0 24px 60px rgba(57, 39, 21, 0.12);
    --color-bg: #f2ecdf;

    --dark-bg-primary: #0d1117;
    --dark-bg-secondary: rgba(18, 24, 32, 0.82);
    --dark-bg-tertiary: #1a2230;
    --dark-bg-quaternary: #243041;
    --dark-border: rgba(215, 176, 122, 0.18);
    --dark-border-subtle: rgba(215, 176, 122, 0.08);
    --dark-text-main: #f4ecdf;
    --dark-text-muted: #b6a590;
    --dark-text-subtle: #7a6f63;
    --dark-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-body);
    background:
      radial-gradient(circle at 12% 0%, rgba(215, 176, 122, 0.24), transparent 28%),
      radial-gradient(circle at 88% 16%, rgba(102, 127, 149, 0.16), transparent 24%),
      linear-gradient(180deg, var(--color-surface) 0%, var(--color-surface-alt) 56%, #e3d9cb 100%);
    color: var(--color-text);
    line-height: 1.65;
    min-height: 100vh;
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(116, 91, 59, 0.03) 0, rgba(116, 91, 59, 0.03) 1px, transparent 1px, transparent 96px),
      linear-gradient(rgba(116, 91, 59, 0.025) 0, rgba(116, 91, 59, 0.025) 1px, transparent 1px, transparent 96px);
    opacity: 0.55;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  html.dark body {
    background:
      radial-gradient(circle at 8% 0%, rgba(215, 176, 122, 0.14), transparent 30%),
      radial-gradient(circle at 88% 20%, rgba(102, 127, 149, 0.18), transparent 26%),
      linear-gradient(180deg, #0d1117 0%, #111721 55%, #151b24 100%);
    color: var(--dark-text-main);
  }

  html.dark {
    --color-bg: #0d1117;
  }

  html.dark body::before {
    background:
      linear-gradient(90deg, rgba(215, 176, 122, 0.025) 0, rgba(215, 176, 122, 0.025) 1px, transparent 1px, transparent 96px),
      linear-gradient(rgba(215, 176, 122, 0.018) 0, rgba(215, 176, 122, 0.018) 1px, transparent 1px, transparent 96px);
    opacity: 0.42;
  }

  html.dark body::after {
    opacity: 0.05;
  }

  ::selection {
    background: rgba(156, 115, 64, 0.18);
    color: inherit;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: -0.03em;
    text-wrap: balance;
  }

  code,
  pre,
  #systemTimeDisplay,
  #mobileTimeDisplay {
    font-family: var(--font-mono);
  }

  a {
    transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease, transform 0.2s ease;
  }

  a:not(.btn-primary):not(.btn-secondary):not(.btn-success):not(.btn-warning):not(.btn-danger):not(.btn-info) {
    color: inherit;
  }

  a:not(.btn-primary):not(.btn-secondary):not(.btn-success):not(.btn-warning):not(.btn-danger):not(.btn-info):hover {
    color: var(--color-primary);
  }

  html.dark a:not(.btn-primary):not(.btn-secondary):not(.btn-success):not(.btn-warning):not(.btn-danger):not(.btn-info):hover {
    color: var(--color-primary-light);
  }

  nav {
    background: rgba(251, 246, 238, 0.72) !important;
    backdrop-filter: blur(18px) saturate(1.2);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    border-bottom: 1px solid var(--color-border) !important;
    box-shadow: 0 12px 40px rgba(57, 39, 21, 0.08);
  }

  html.dark nav {
    background: rgba(12, 17, 24, 0.78) !important;
    border-bottom-color: var(--dark-border) !important;
    box-shadow: var(--dark-shadow);
  }

  .shell-nav-inner {
    display: flex;
    align-items: center;
    gap: 1rem;
    min-height: 5rem;
  }

  .shell-brand {
    display: flex;
    align-items: center;
    gap: 0.95rem;
    min-width: 0;
  }

  .shell-brand-mark {
    position: relative;
    width: 3rem;
    height: 3rem;
    border-radius: 1rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff6eb;
    background: linear-gradient(145deg, var(--color-primary) 0%, #c79d68 100%);
    box-shadow: 0 14px 28px rgba(156, 115, 64, 0.22);
    flex-shrink: 0;
  }

  .shell-brand-mark::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    border: 1px solid rgba(255, 255, 255, 0.24);
  }

  .shell-brand-copy {
    display: flex;
    flex-direction: column;
    line-height: 1.05;
  }

  .shell-brand-copy span {
    font-family: var(--font-display);
    font-size: 1.12rem;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .shell-brand-copy small {
    font-family: var(--font-mono);
    font-size: 0.66rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--color-text-subtle);
    margin-top: 0.2rem;
  }

  html.dark .shell-brand-copy small {
    color: var(--dark-text-subtle);
  }

  .shell-time {
    padding: 0.66rem 0.95rem;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.34);
    color: var(--color-text-muted);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  html.dark .shell-time {
    border-color: var(--dark-border);
    background: rgba(255, 255, 255, 0.03);
    color: var(--dark-text-muted);
  }

  .shell-menu-btn {
    width: 2.9rem;
    height: 2.9rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    color: var(--color-text-muted);
    border: 1px solid transparent;
    background: transparent;
  }

  .shell-menu-btn:hover {
    color: var(--color-text);
    border-color: var(--color-border);
    background: rgba(255, 255, 255, 0.32);
  }

  html.dark .shell-menu-btn {
    color: var(--dark-text-main);
  }

  html.dark .shell-menu-btn:hover {
    border-color: var(--dark-border);
    background: rgba(255, 255, 255, 0.04);
  }

  .shell-link {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.78rem 1rem;
    border-radius: 999px;
    border: 1px solid transparent;
    color: var(--color-text-muted);
    font-size: 0.88rem;
    font-weight: 700;
  }

  .shell-link:hover {
    color: var(--color-text);
    background: rgba(255, 255, 255, 0.34);
    border-color: var(--color-border-subtle);
    transform: translateY(-1px);
  }

  .shell-link-active {
    color: var(--color-text);
    background: rgba(255, 255, 255, 0.68);
    border-color: var(--color-border);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
  }

  html.dark .shell-link {
    color: var(--dark-text-muted);
  }

  html.dark .shell-link:hover {
    color: var(--dark-text-main);
    background: rgba(255, 255, 255, 0.035);
    border-color: var(--dark-border);
  }

  html.dark .shell-link-active {
    color: var(--dark-text-main);
    background: linear-gradient(180deg, rgba(215, 176, 122, 0.12), rgba(255, 255, 255, 0.03));
    border-color: var(--dark-border);
  }

  .shell-mobile-panel {
    background: rgba(251, 246, 238, 0.94);
    border-top: 1px solid var(--color-border);
    border-bottom: 1px solid var(--color-border);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  html.dark .shell-mobile-panel {
    background: rgba(13, 17, 23, 0.94);
    border-color: var(--dark-border);
  }

  .shell-mobile-link {
    display: block;
    padding: 0.95rem 1rem;
    border-radius: 1rem;
    border: 1px solid transparent;
    color: var(--color-text-muted);
    font-weight: 700;
  }

  .shell-mobile-link:hover {
    color: var(--color-text);
    background: rgba(255, 255, 255, 0.46);
    border-color: var(--color-border);
  }

  .shell-mobile-link-active {
    color: var(--color-text);
    background: rgba(255, 255, 255, 0.74);
    border-color: var(--color-border);
  }

  html.dark .shell-mobile-link {
    color: var(--dark-text-muted);
  }

  html.dark .shell-mobile-link:hover {
    color: var(--dark-text-main);
    background: rgba(255, 255, 255, 0.04);
  }

  html.dark .shell-mobile-link-active {
    color: var(--dark-text-main);
    background: rgba(215, 176, 122, 0.12);
    border-color: var(--dark-border);
  }

  .hero-banner {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--color-border);
    border-radius: 2rem;
    padding: 1.75rem;
    background: linear-gradient(135deg, rgba(255, 250, 245, 0.92) 0%, rgba(246, 239, 229, 0.74) 52%, rgba(231, 221, 207, 0.66) 100%);
    box-shadow: var(--color-shadow);
  }

  .hero-banner::before {
    content: '';
    position: absolute;
    right: -12%;
    bottom: -34%;
    width: 20rem;
    height: 20rem;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(156, 115, 64, 0.24), transparent 62%);
    pointer-events: none;
  }

  .hero-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, rgba(255, 255, 255, 0.22), transparent 34%, rgba(102, 127, 149, 0.08) 80%);
    pointer-events: none;
  }

  html.dark .hero-banner {
    background: linear-gradient(145deg, rgba(17, 24, 33, 0.92) 0%, rgba(13, 18, 24, 0.9) 54%, rgba(15, 20, 27, 0.86) 100%);
    border-color: var(--dark-border);
    box-shadow: var(--dark-shadow);
  }

  html.dark .hero-banner::before {
    background: radial-gradient(circle, rgba(215, 176, 122, 0.18), transparent 62%);
  }

  .hero-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(16rem, 0.92fr);
    gap: 1.25rem;
    align-items: stretch;
  }

  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--color-primary);
    margin-bottom: 0.85rem;
  }

  .hero-title {
    margin: 0;
    font-size: clamp(2rem, 4.2vw, 3.4rem);
    line-height: 1.02;
    max-width: 12ch;
  }

  .hero-copy {
    margin: 1rem 0 0;
    max-width: 60ch;
    color: var(--color-text-muted);
    font-size: 1rem;
  }

  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.65rem;
    margin-top: 1.35rem;
  }

  .hero-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.68rem 0.95rem;
    border-radius: 999px;
    border: 1px solid var(--color-border);
    background: rgba(255, 255, 255, 0.44);
    color: var(--color-text-muted);
    font-size: 0.8rem;
    font-weight: 700;
  }

  .hero-pill i {
    color: var(--color-primary);
  }

  .hero-aside {
    display: grid;
    gap: 0.85rem;
  }

  .hero-stat {
    position: relative;
    min-height: 9rem;
    padding: 1.15rem 1.2rem;
    border-radius: 1.4rem;
    border: 1px solid var(--color-border);
    background: rgba(255, 255, 255, 0.54);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .hero-stat::after {
    content: '';
    position: absolute;
    right: -10%;
    bottom: -28%;
    width: 7.5rem;
    height: 7.5rem;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(102, 127, 149, 0.18), transparent 70%);
  }

  .hero-stat-accent::after {
    background: radial-gradient(circle, rgba(156, 115, 64, 0.18), transparent 70%);
  }

  .hero-stat span {
    position: relative;
    z-index: 1;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-text-subtle);
  }

  .hero-stat strong {
    position: relative;
    z-index: 1;
    font-family: var(--font-display);
    font-size: 1.5rem;
    line-height: 1.1;
    color: var(--color-text);
  }

  .hero-stat small {
    position: relative;
    z-index: 1;
    color: var(--color-text-muted);
    font-size: 0.86rem;
  }

  html.dark .hero-eyebrow {
    color: var(--color-primary-light);
  }

  html.dark .hero-copy,
  html.dark .hero-pill,
  html.dark .hero-stat small {
    color: var(--dark-text-muted);
  }

  html.dark .hero-pill,
  html.dark .hero-stat {
    border-color: var(--dark-border);
    background: rgba(255, 255, 255, 0.035);
  }

  html.dark .hero-stat span {
    color: var(--dark-text-subtle);
  }

  html.dark .hero-stat strong {
    color: var(--dark-text-main);
  }

  .glass-card,
  .surface-card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    box-shadow: var(--color-shadow);
    backdrop-filter: blur(20px) saturate(1.1);
    -webkit-backdrop-filter: blur(20px) saturate(1.1);
  }

  html.dark .glass-card,
  html.dark .surface-card {
    background: var(--dark-bg-secondary);
    border-color: var(--dark-border);
    box-shadow: var(--dark-shadow);
  }

  .card-hover {
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.2s ease;
  }

  .card-hover:hover {
    transform: translateY(-4px);
    box-shadow: 0 26px 60px rgba(57, 39, 21, 0.16);
  }

  html.dark .card-hover:hover {
    box-shadow: 0 28px 70px rgba(0, 0, 0, 0.42);
  }

  .table-container {
    border: 1px solid var(--color-border);
    border-radius: 1.5rem;
    overflow: hidden;
    background: var(--color-card);
    box-shadow: var(--color-shadow);
  }

  html.dark .table-container {
    background: var(--dark-bg-secondary);
    border-color: var(--dark-border);
    box-shadow: var(--dark-shadow);
  }

  thead {
    background: rgba(255, 250, 245, 0.84) !important;
  }

  thead th {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--color-text-subtle) !important;
    border-bottom: 1px solid var(--color-border-subtle) !important;
  }

  tbody tr {
    transition: background-color 0.2s ease, transform 0.2s ease;
  }

  tbody tr:hover {
    background: rgba(255, 255, 255, 0.46) !important;
  }

  html.dark thead {
    background: rgba(255, 255, 255, 0.02) !important;
  }

  html.dark thead th {
    color: var(--dark-text-muted) !important;
    border-bottom-color: var(--dark-border-subtle) !important;
  }

  html.dark tbody tr:hover {
    background: rgba(255, 255, 255, 0.03) !important;
  }

  input,
  select,
  textarea {
    border-radius: 1rem !important;
    border: 1px solid var(--color-border) !important;
    background: rgba(255, 255, 255, 0.78) !important;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
  }

  input:hover,
  select:hover,
  textarea:hover {
    border-color: var(--color-border-strong) !important;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: rgba(156, 115, 64, 0.5) !important;
    background: rgba(255, 255, 255, 0.92) !important;
    box-shadow: 0 0 0 4px rgba(156, 115, 64, 0.12) !important;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
  }

  html.dark input,
  html.dark select,
  html.dark textarea {
    background: rgba(36, 48, 65, 0.55) !important;
    border-color: var(--dark-border) !important;
    color: var(--dark-text-main) !important;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  html.dark input:hover,
  html.dark select:hover,
  html.dark textarea:hover {
    border-color: rgba(215, 176, 122, 0.28) !important;
  }

  html.dark input:focus,
  html.dark select:focus,
  html.dark textarea:focus {
    background: rgba(36, 48, 65, 0.88) !important;
    border-color: rgba(215, 176, 122, 0.45) !important;
    box-shadow: 0 0 0 4px rgba(215, 176, 122, 0.1) !important;
  }

  input::placeholder,
  textarea::placeholder {
    color: #9a8871;
  }

  html.dark input::placeholder,
  html.dark textarea::placeholder {
    color: var(--dark-text-subtle);
  }

  input[readonly],
  .readonly-input {
    background: rgba(237, 231, 221, 0.8) !important;
    color: var(--color-text-muted) !important;
    cursor: not-allowed;
  }

  html.dark input[readonly],
  html.dark .readonly-input {
    background: rgba(18, 24, 32, 0.9) !important;
    color: var(--dark-text-muted) !important;
  }

  input[type='checkbox'],
  .form-checkbox {
    accent-color: var(--color-primary);
  }

  .btn-primary,
  .btn-secondary,
  .btn-success,
  .btn-warning,
  .btn-danger,
  .btn-info {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.55rem;
    padding: 0.78rem 1.25rem;
    border-radius: 999px;
    border: none;
    color: #fff8ef;
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
  }

  .btn-primary::before,
  .btn-secondary::before,
  .btn-success::before,
  .btn-warning::before,
  .btn-danger::before,
  .btn-info::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 55%);
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .btn-primary:hover,
  .btn-secondary:hover,
  .btn-success:hover,
  .btn-warning:hover,
  .btn-danger:hover,
  .btn-info:hover {
    transform: translateY(-2px);
  }

  .btn-primary:hover::before,
  .btn-secondary:hover::before,
  .btn-success:hover::before,
  .btn-warning:hover::before,
  .btn-danger:hover::before,
  .btn-info:hover::before {
    opacity: 1;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--color-primary) 0%, #c18f57 100%);
    box-shadow: 0 14px 28px rgba(156, 115, 64, 0.22);
  }

  .btn-secondary {
    background: linear-gradient(135deg, #4f6276 0%, #324254 100%);
    box-shadow: 0 14px 28px rgba(50, 66, 84, 0.24);
  }

  .btn-success {
    background: linear-gradient(135deg, #3d7d5d 0%, #2a5b43 100%);
    box-shadow: 0 14px 28px rgba(42, 91, 67, 0.24);
  }

  .btn-warning {
    background: linear-gradient(135deg, #b78635 0%, #8f6728 100%);
    box-shadow: 0 14px 28px rgba(143, 103, 40, 0.24);
  }

  .btn-danger {
    background: linear-gradient(135deg, #9d4d44 0%, #7e3b33 100%);
    box-shadow: 0 14px 28px rgba(126, 59, 51, 0.24);
  }

  .btn-info {
    background: linear-gradient(135deg, #5c7b97 0%, #405a74 100%);

<script>
  (function() {
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

    function applyTheme(mode) {
      const html = document.documentElement;
      const isSystemDark = mediaQuery.matches;
      const useDark = mode === 'dark' || (mode === 'system' && isSystemDark);

      html.classList.toggle('dark', useDark);
      html.dispatchEvent(new CustomEvent('themechange', {
        detail: {
          mode,
          isDark: useDark
        }
      }));
    }

    const savedTheme = localStorage.getItem('themeMode') || 'system';
    applyTheme(savedTheme);

    const handleSystemThemeChange = function() {
      const currentMode = localStorage.getItem('themeMode') || 'system';
      if (currentMode === 'system') {
        applyTheme('system');
      }
    };

    if (typeof mediaQuery.addEventListener === 'function') {
      mediaQuery.addEventListener('change', handleSystemThemeChange);
    } else if (typeof mediaQuery.addListener === 'function') {
      mediaQuery.addListener(handleSystemThemeChange);
    }

    window.addEventListener('load', async () => {
      if (window.location.pathname.startsWith('/admin')) {
        try {
          const res = await fetch('/api/config');
          const config = await res.json();
          if (config.THEME_MODE && config.THEME_MODE !== localStorage.getItem('themeMode')) {
            localStorage.setItem('themeMode', config.THEME_MODE);
            applyTheme(config.THEME_MODE);
            const select = document.getElementById('themeModeSelect');
            if (select) {
              select.value = config.THEME_MODE;
            }
          }
        } catch (e) {}
      }
    });

    window.updateAppTheme = function(mode) {
      localStorage.setItem('themeMode', mode);
      applyTheme(mode);
    };
  })();
</script>
