<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - SubsTracker</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  ${themeResources}  <style>
    /* === 统计卡片样式 === */
    .stat-card{
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .stat-card:hover::before { opacity: 1; }
    @media (prefers-reduced-motion: no-preference) {
      .stat-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
    }
    .stat-card-header{
      color: var(--color-text-muted);
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
      font-family: var(--font-display);
    }
    .stat-card-value{
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--color-text);
      margin-bottom: 0.25rem;
      font-family: var(--font-display);
      letter-spacing: -0.02em;
    }
    .stat-card-subtitle{color:var(--color-text-subtle);font-size:0.875rem}
    .stat-card-trend{display:inline-flex;align-items:center;gap:0.375rem;font-size:0.8125rem;margin-top:0.75rem;padding:0.375rem 0.75rem;border-radius:8px;font-weight:600}
    .stat-card-trend.up{color:#10b981;background:#d1fae5}
    .stat-card-trend.down{color:#ef4444;background:#fee2e2}
    .stat-card-trend.flat{color:#64748b;background:#f1f5f9}
    .list-item{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-radius:12px;transition:background 0.2s,transform 0.2s;margin-bottom:0.5rem}
    .list-item:hover{background:var(--color-border-subtle);transform:translateX(4px)}
    .list-item:not(:last-child){border-bottom:none}
    .list-item-content{flex:1}
    .list-item-name{font-weight:600;color:var(--color-text);margin-bottom:0.375rem;font-family:var(--font-display)}
    .list-item-meta{display:flex;align-items:center;gap:1rem;font-size:0.8125rem;color:var(--color-text-muted);flex-wrap:wrap}
    .list-item-amount{font-size:1.125rem;font-weight:700;color:var(--color-primary)}
    .list-item-badge{display:inline-block;padding:0.25rem 0.75rem;border-radius:20px;font-size:0.75rem;font-weight:600;background:linear-gradient(135deg,#e0e7ff 0%,#c7d2fe 100%);color:#4f46e5}
    .ranking-item{margin-bottom:1.25rem}
    .ranking-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem}
    .ranking-item-name{font-weight:600;color:var(--color-text);font-family:var(--font-display)}
    .ranking-item-value{display:flex;align-items:center;gap:0.5rem;font-size:0.875rem}
    .ranking-item-amount{font-weight:700;color:var(--color-text)}
    .ranking-item-percentage{color:var(--color-primary);font-weight:600}
    .ranking-progress{width:100%;height:6px;background:var(--color-border);border-radius:3px;overflow:hidden}
    .ranking-progress-bar{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.4, 0, 0.2, 1)}
    .ranking-progress-bar.color-1{background:linear-gradient(90deg,var(--color-primary),#14b8a6)}
    .ranking-progress-bar.color-2{background:linear-gradient(90deg,#10b981,#059669)}
    .ranking-progress-bar.color-3{background:linear-gradient(90deg,var(--color-accent),#d97706)}
    .ranking-progress-bar.color-4{background:linear-gradient(90deg,#ef4444,#dc2626)}
    .ranking-progress-bar.color-5{background:linear-gradient(90deg,#8b5cf6,#7c3aed)}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--color-text-muted)}
    .empty-state-icon{font-size:3.5rem;margin-bottom:1rem;opacity:0.4}
    .empty-state-text{font-size:0.9375rem}
    /* === 订阅花费构成卡片 === */
    .period-amount{font-size:2.5rem;font-weight:800;color:var(--color-text);font-family:var(--font-display);letter-spacing:-0.02em;margin-bottom:0.25rem}
    html.dark .period-amount{color:var(--dark-text-main)}
    .period-subtitle{font-size:0.875rem;color:var(--color-text-subtle)}
    html.dark .period-subtitle{color:var(--dark-text-subtle)}
    .legend-row{display:flex;align-items:center;gap:0.5rem;padding:0.375rem 0;font-size:0.8125rem}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .legend-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-text)}
    .legend-amount{white-space:nowrap;color:var(--color-text-muted)}
    .legend-pct{font-weight:600;min-width:40px;text-align:right;color:var(--color-primary)}
    html.dark .legend-name{color:var(--dark-text-main)}
    html.dark .legend-amount{color:var(--dark-text-muted)}
    html.dark .legend-pct{color:var(--color-primary-light,#a5b4fc)}
    /* === Dashboard 暗黑模式修复 === */
    html.dark .stat-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }
    html.dark .stat-card::before { background: linear-gradient(90deg, var(--color-primary-light), var(--color-accent)); }
    html.dark .stat-card-header { color: var(--dark-text-muted); }
    html.dark .stat-card-value { color: var(--dark-text-main); }
    html.dark .stat-card-subtitle { color: var(--dark-text-subtle); }
    html.dark .stat-card-trend.flat { background: var(--dark-bg-tertiary); color: var(--dark-text-muted); }
    html.dark .stat-card-trend.up { background: rgba(16, 185, 129, 0.15); }
    html.dark .stat-card-trend.down { background: rgba(239, 68, 68, 0.15); }
    html.dark .list-item:hover { background: var(--dark-bg-tertiary); }
    html.dark .list-item-name { color: var(--dark-text-main); }
    html.dark .list-item-meta { color: var(--dark-text-muted); }
    html.dark .list-item-badge { background: linear-gradient(135deg,rgba(99,102,241,0.2) 0%,rgba(129,140,248,0.2) 100%);color:#a5b4fc }
    html.dark .ranking-item-name { color: var(--dark-text-main); }
    html.dark .ranking-item-amount { color: #e2e8f0; }
    html.dark .ranking-progress { background: var(--dark-border); }
    html.dark .bg-indigo-100 { background-color: rgba(99, 102, 241, 0.15) !important; color: #a5b4fc !important; }
    html.dark .text-indigo-800 { color: #c7d2fe !important; }
    .loading-skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:loading 1.5s infinite;height:100px;border-radius:12px}
    html.dark .loading-skeleton { background: linear-gradient(90deg, var(--dark-bg-tertiary) 25%, #475569 50%, var(--dark-bg-tertiary) 75%); }
    @keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @media (prefers-reduced-motion: reduce) {
      .loading-skeleton{animation:none;background:#f1f5f9}
      html.dark .loading-skeleton{animation:none;background:var(--dark-bg-tertiary)}
    }
    /* === 页面标题 === */
    .page-title{font-size:1.75rem;font-weight:800;color:var(--color-text);font-family:var(--font-display);letter-spacing:-0.02em}
    .page-subtitle{color:var(--color-text-muted);font-size:0.9375rem;margin-top:0.5rem}
    html.dark .page-title{color:var(--dark-text-main)}
    html.dark .page-subtitle{color:var(--dark-text-muted)}
    /* === 面板头部 === */
    .panel-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--color-border-subtle);display:flex;align-items:center;justify-content:space-between}
    html.dark .panel-header{border-bottom-color:var(--dark-border)}
    .panel-title{display:flex;align-items:center;gap:0.75rem;font-family:var(--font-display);font-weight:600;color:var(--color-text)}
    html.dark .panel-title{color:var(--dark-text-main)}
    /* === 标签 === */
    .badge{display:inline-flex;align-items:center;padding:0.375rem 0.875rem;border-radius:20px;font-size:0.75rem;font-weight:600;background:linear-gradient(135deg,rgba(99,102,241,0.1) 0%,rgba(99,102,241,0.05) 100%);color:#6366f1;border:1px solid rgba(99,102,241,0.2)}
    html.dark .badge{background:linear-gradient(135deg,rgba(99,102,241,0.15) 0%,rgba(99,102,241,0.08) 100%);color:#a5b4fc;border-color:rgba(99,102,241,0.3)}
  </style>
</head>

  <script>
    // 定义货币符号映射
    const currencySymbols = {
      'CNY': '¥', 'USD': '$', 'HKD': 'HK$', 'TWD': 'NT$', 
      'JPY': '¥', 'EUR': '€', 'GBP': '£', 'KRW': '₩', 'TRY': '₺'
    };
    function getSymbol(currency) {
      return currencySymbols[currency] || '¥';
    }

    // 前端统一本地时区显示
    async function showSystemTime() {
      try {
        const localTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';

        function formatTimezoneDisplay(tz) {
          try {
            const now = new Date();
            const dtf = new Intl.DateTimeFormat('en-US', {
              timeZone: tz,
              hour12: false,
              year: 'numeric', month: '2-digit', day: '2-digit',
              hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            const parts = dtf.formatToParts(now);
            const get = type => Number(parts.find(x => x.type === type).value);
            const target = Date.UTC(get('year'), get('month') - 1, get('day'), get('hour'), get('minute'), get('second'));
            const utc = now.getTime();
            const offset = Math.round((target - utc) / (1000 * 60 * 60));
            const offsetStr = offset >= 0 ? '+' + offset : offset;
            return `${tz} (UTC${offsetStr})`;
          } catch (error) {
            console.error('格式化时区显示失败:', error);
            return tz;
          }
        }

        function update() {
          const now = new Date();
          const timeStr = now.toLocaleString('zh-CN', {
            timeZone: localTimezone,
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
          });
          const tzStr = formatTimezoneDisplay(localTimezone);
          const el = document.getElementById('systemTimeDisplay');
          if (el) {
            el.textContent = `${timeStr}  ${tzStr}`;
          }
          const mobileEl = document.getElementById('mobileTimeDisplay');
          if (mobileEl) {
            mobileEl.textContent = `${timeStr} ${tzStr}`;
          }
        }

        update();
        setInterval(update, 1000);
      } catch (e) {
        console.error(e);
      }
    }

    async function loadDashboardData(){
      try {
        const r=await fetch('/api/dashboard/stats');
        const d=await r.json();
        if(!d.success) throw new Error(d.message||'加载失败');
        
        const data=d.data;

        const schedulerStatusEl = document.getElementById('schedulerStatus');
        if (schedulerStatusEl) {
          const status = data.schedulerStatus;
          if (!status) {
            schedulerStatusEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🕐</div><div class="empty-state-text">暂无定时任务执行记录（等待下一次 Cron）</div></div>';
          } else {
            const sendResult = status.sendResult || {};
            const runAt = status.lastRunAt ? new Date(status.lastRunAt).toLocaleString('zh-CN') : '未知';
            const configuredHours = Array.isArray(status.configuredHours) && status.configuredHours.length > 0
              ? status.configuredHours.join(', ')
              : '全部时段';
            const sentBadge = status.sent
              ? '<span class="px-2 py-1 rounded text-xs font-medium bg-green-100 text-green-700">本次有发送</span>'
              : '<span class="px-2 py-1 rounded text-xs font-medium bg-yellow-100 text-yellow-700">本次未发送</span>';

            schedulerStatusEl.innerHTML = `
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                <div class="bg-gray-50 rounded-md p-3">
                  <div class="text-gray-500">最近执行时间</div>
                  <div class="text-gray-900 font-medium mt-1">${runAt}</div>
                </div>
                <div class="bg-gray-50 rounded-md p-3">
                  <div class="text-gray-500">状态</div>
                  <div class="mt-1">${sentBadge}</div>
                </div>
                <div class="bg-gray-50 rounded-md p-3">
                  <div class="text-gray-500">当前小时 / 配置时段（UTC）</div>
                  <div class="text-gray-900 font-medium mt-1">${status.currentHour || '--'} / ${configuredHours}</div>
                </div>
                <div class="bg-gray-50 rounded-md p-3">
                  <div class="text-gray-500">检查与命中</div>
                  <div class="text-gray-900 font-medium mt-1">检查 ${status.checkedSubscriptions || 0} 条，命中 ${status.expiringMatched || 0} 条</div>
                </div>
                <div class="bg-gray-50 rounded-md p-3 md:col-span-2">
                  <div class="text-gray-500">发送结果</div>
                  <div class="text-gray-900 font-medium mt-1">尝试 ${sendResult.attempted || 0} 个渠道，成功 ${sendResult.successCount || 0}，失败 ${sendResult.failedCount || 0}，去重跳过 ${status.dedupeSkipped || 0}</div>
                  <div class="text-xs text-gray-500 mt-1">${status.reason || '暂无详情'}</div>
                </div>
              </div>
            `;
          }
        }

        const schedulerHistory = Array.isArray(data.schedulerStatusHistory) ? data.schedulerStatusHistory : [];
        const schedulerHistoryEl = document.getElementById('schedulerStatusHistory');
        if (schedulerHistoryEl) {
          if (schedulerHistory.length === 0) {
            schedulerHistoryEl.innerHTML = '<div class="text-sm text-gray-500">暂无历史记录</div>';
          } else {
            schedulerHistoryEl.innerHTML = schedulerHistory.slice(0, 10).map(item => {
              const when = item.lastRunAt ? new Date(item.lastRunAt).toLocaleString('zh-CN') : '未知时间';
              const sent = item.sent ? '已发送' : '未发送';
              const reason = item.reason || '-';
              return `<div class="py-2 border-b border-gray-100 last:border-b-0 text-sm"><div class="font-medium text-gray-800">${when} · ${sent}</div><div class="text-xs text-gray-500 mt-1">${reason}</div></div>`;
            }).join('');
          }
        }

        document.getElementById('statsGrid').innerHTML=`
          <div class="stat-card">
            <div class="stat-card-header">月度支出 (CNY)</div>
            <div class="stat-card-value">¥${data.monthlyExpense.amount.toFixed(2)}</div>
            <div class="stat-card-subtitle">本月折合支出</div>
            <div class="stat-card-trend ${data.monthlyExpense.trendDirection}">
              <i class="fas fa-arrow-${data.monthlyExpense.trendDirection==='up'?'up':data.monthlyExpense.trendDirection==='down'?'down':'right'}"></i>
              ${data.monthlyExpense.trend}%
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-card-header">年度支出 (CNY)</div>
            <div class="stat-card-value">¥${data.yearlyExpense.amount.toFixed(2)}</div>
            <div class="stat-card-subtitle">月均支出: ¥${data.yearlyExpense.monthlyAverage.toFixed(2)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-header">活跃订阅</div>
            <div class="stat-card-value">${data.activeSubscriptions.active}</div>
            <div class="stat-card-subtitle">总订阅数: ${data.activeSubscriptions.total}</div>
            ${data.activeSubscriptions.expiringSoon>0?`<div class="stat-card-trend down"><i class="fas fa-exclamation-circle"></i>${data.activeSubscriptions.expiringSoon} 即将到期</div>`:''}
          </div>
        `;
        
        const rp=document.getElementById('recentPayments');
        rp.innerHTML=data.recentPayments.length===0?'<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">过去7天内没有支付记录</div></div>':
        data.recentPayments.map(s=>`
          <div class="list-item">
            <div class="list-item-content">
              <div class="list-item-name">${s.name}</div>
              <div class="list-item-meta">
                <span><i class="fas fa-calendar"></i> ${new Date(s.paymentDate).toLocaleDateString('zh-CN')}</span>
                ${s.customType?`<span class="list-item-badge">${s.customType}</span>`:''}
              </div>
            </div>
            <div class="list-item-amount">¥${(s.amountCNY||0).toFixed(2)}${s.currency!=='CNY'?`<div style="font-size:0.75rem;color:var(--color-text-muted);font-weight:400">≈ ${getSymbol(s.currency)}${(s.amount||0).toFixed(2)}</div>`:''}</div>
          </div>
        `).join('');

        const ur=document.getElementById('upcomingRenewals');
        ur.innerHTML=data.upcomingRenewals.length===0?'<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-text">未来7天内没有即将续费的订阅</div></div>':
        data.upcomingRenewals.map(s=>`
          <div class="list-item">
            <div class="list-item-content">
              <div class="list-item-name">${s.name}</div>
              <div class="list-item-meta">
                <span><i class="fas fa-clock"></i> ${new Date(s.renewalDate).toLocaleDateString('zh-CN')}</span>
                <span style="color:#f59e0b;font-weight:600">${s.daysUntilRenewal} 天后</span>
                ${s.customType?`<span class="list-item-badge">${s.customType}</span>`:''}
              </div>
            </div>
            <div class="list-item-amount">¥${(s.amountCNY||0).toFixed(2)}${s.currency!=='CNY'?`<div style="font-size:0.75rem;color:var(--color-text-muted);font-weight:400">≈ ${getSymbol(s.currency)}${(s.amount||0).toFixed(2)}</div>`:''}</div>
          </div>
        `).join('');

        const et=document.getElementById('expenseByType');
        et.innerHTML=data.expenseByType.length===0?'<div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-text">暂无支出数据</div></div>':
        data.expenseByType.map((item,i)=>`
          <div class="ranking-item">
            <div class="ranking-item-header">
              <div class="ranking-item-name">${item.type}</div>
              <div class="ranking-item-value">
                <span class="ranking-item-amount">¥${item.amount.toFixed(2)}</span>
                <span class="ranking-item-percentage">${item.percentage}%</span>
              </div>
            </div>
            <div class="ranking-progress">
              <div class="ranking-progress-bar color-${(i%5)+1}" style="width:${item.percentage}%"></div>
            </div>
          </div>
        `).join('');
        
        const ec=document.getElementById('expenseByCategory');
        ec.innerHTML=data.expenseByCategory.length===0?'<div class="empty-state"><div class="empty-state-icon">📂</div><div class="empty-state-text">暂无支出数据</div></div>':
        data.expenseByCategory.map((item,i)=>`
          <div class="ranking-item">
            <div class="ranking-item-header">
              <div class="ranking-item-name">${item.category}</div>
              <div class="ranking-item-value">
                <span class="ranking-item-amount">¥${item.amount.toFixed(2)}</span>
                <span class="ranking-item-percentage">${item.percentage}%</span>
              </div>
            </div>
            <div class="ranking-progress">
              <div class="ranking-progress-bar color-${(i%5)+1}" style="width:${item.percentage}%"></div>
            </div>
          </div>
        `).join('');

        // 渲染生效订阅花费饼图
        if (data.activeSubsBreakdown) {
          renderActiveSubsBreakdown(data.activeSubsBreakdown);
        }
      } catch(e){
        console.error('加载仪表盘数据失败:',e);
        document.getElementById('statsGrid').innerHTML='<div class="empty-state"><div class="empty-state-icon">❌</div><div class="empty-state-text">加载失败:'+e.message+'</div></div>';
      }
    }
    
    // 初始化时间显示和数据加载
    showSystemTime();
    loadDashboardData();
    setInterval(loadDashboardData, 60000);

    // --- 订阅花费构成（饼图） ---
    const PIE_COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#64748b'];
    let subsPieChart = null;

    function renderActiveSubsBreakdown(data) {
      const el = document.getElementById('activeSubsBreakdown');
      const { total, items } = data;
      if (!items || items.length === 0) {
        el.innerHTML = '<div class="empty-state" style="padding:1rem"><div class="empty-state-text">暂无生效订阅</div></div>';
        return;
      }
      const sorted = [...items].sort((a, b) => b.amountCNY - a.amountCNY);
      el.innerHTML = `
        <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
          <div style="flex-shrink:0;text-align:center;min-width:140px">
            <div class="period-amount" style="font-size:1.75rem">¥${total.toFixed(2)}</div>
            <div class="period-subtitle">月均合计</div>
            <div class="period-subtitle" style="margin-top:0.25rem">共 ${sorted.length} 项生效订阅</div>
          </div>
          <div style="flex:1;min-width:200px;max-width:280px;margin:0 auto">
            <canvas id="subsPieChart"></canvas>
          </div>
          <div style="flex:1;min-width:200px" id="subsLegend"></div>
        </div>
      `;
      const ctx = document.getElementById('subsPieChart').getContext('2d');
      if (subsPieChart) subsPieChart.destroy();
      subsPieChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: sorted.map(i => i.name),
          datasets: [{
            data: sorted.map(i => i.amountCNY),
            backgroundColor: sorted.map((_, i) => PIE_COLORS[i % PIE_COLORS.length]),
            borderWidth: 2,
            borderColor: getComputedStyle(document.documentElement).getPropertyValue('--color-bg').trim() || '#fff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `¥${ctx.parsed.toFixed(2)}/月 (${(ctx.parsed / total * 100).toFixed(1)}%)`
              }
            }
          },
          cutout: '55%'
        }
      });
      document.getElementById('subsLegend').innerHTML = sorted.map((item, i) => {
        const pct = total > 0 ? (item.amountCNY / total * 100).toFixed(1) : 0;
        return `<div class="legend-row">
          <span class="legend-dot" style="background:${PIE_COLORS[i % PIE_COLORS.length]}"></span>
          <span class="legend-name">${item.name}</span>
          <span class="legend-amount">¥${item.amountCNY.toFixed(2)}/月</span>
          <span class="legend-pct">${pct}%</span>
        </div>`;
      }).join('');
    }

    // --- 移动端菜单控制脚本 ---
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    
    if (mobileMenuBtn && mobileMenu) {
      const syncMobileMenuState = () => {
        const icon = mobileMenuBtn.querySelector('i');
        const isHidden = mobileMenu.classList.contains('hidden');
        mobileMenuBtn.setAttribute('aria-expanded', isHidden ? 'false' : 'true');
        if (icon) {
          icon.classList.toggle('fa-bars', isHidden);
          icon.classList.toggle('fa-times', !isHidden);
        }
      };

      mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        syncMobileMenuState();
      });

      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          mobileMenu.classList.add('hidden');
          syncMobileMenuState();
        });
      });

      document.addEventListener('click', (event) => {
        if (mobileMenu.classList.contains('hidden')) return;
        if (!mobileMenu.contains(event.target) && !mobileMenuBtn.contains(event.target)) {
          mobileMenu.classList.add('hidden');
          syncMobileMenuState();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !mobileMenu.classList.contains('hidden')) {
          mobileMenu.classList.add('hidden');
          syncMobileMenuState();
        }
      });

      syncMobileMenuState();
    }
  </script>
</body>
</html>
